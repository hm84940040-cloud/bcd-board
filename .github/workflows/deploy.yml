name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main # main 브랜치에 코드가 push될 때만 실행됩니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH를 통한 오라클 서버 접속 및 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            # 1. 프로젝트 폴더로 이동 (본인의 실제 서버 폴더 경로로 꼭 수정하세요!)
            cd /home/ubuntu/bcd-board
            
            # 2. 최신 코드 가져오기
            git pull origin main
            
            # 3. 패키지 설치
            npm install
            
            # 4. 빌드하기
            npm run build
            
            # 5. 서버 재시작 (PM2 사용)
            pm2 restart ecosystem.config.cjs
