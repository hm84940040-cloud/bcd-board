<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BCD+ Extension</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; width: 280px; }
    h2 { margin-top: 0; font-size: 16px; color: #1e293b; }
    label { display: block; margin-top: 10px; font-size: 12px; font-weight: bold; color: #475569; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { width: 100%; margin-top: 15px; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1d4ed8; }
    .status { margin-top: 10px; font-size: 12px; color: #10b981; font-weight: bold; text-align: center; display: none; }
  </style>
</head>
<body>
  <h2>BCD+ 대시보드 동기화 </h2>
  
  <label for="serverUrl">서버 URL</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:3000/api/update_data.php">
  
  <label for="syncKey">Sync Key</label>
  <input type="text" id="syncKey" placeholder="3735d8ead16b3bb107e4c967ebe676">
  
  <button id="saveBtn">저장하기</button>
  <div id="status" class="status">저장되었습니다!</div>

  <script src="popup.js"></script>
</body>
</html>
